<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% if page.id %}
	<title>{{ page.title }} | {{ site.title }}</title>
	{% else %}
	<title>{{ site.title }}</title>
	{% endif %}
  {% seo %}
  <link rel="stylesheet" href="{{ "/main.css" | relative_url }}">
  <link rel="apple-touch-icon-precomposed" sizes="192x192" href="{{ site.baseurl }}/img/apple-icon-precomposed.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/img/favicon-96x96.png">


  {% if site.tags != "" %}
    {% include collecttags.html %}
  {% endif %}

  <script defer src="https://cloud.umami.is/script.js" data-website-id="ea01c721-04db-4c01-9a97-ae88acb7ea7e"></script>

</head>
